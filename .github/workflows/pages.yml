# GitHub Pages deploy for Shield Scanner mono.
# Source of truth for https://nisake.github.io/shield-scanner-mono/
#
# Builds packages/web (esbuild bundle + index.html + og-image.png) and
# publishes packages/web/dist as the Pages artifact. No minification — the
# R12-R17 grep-based audit story relies on readable bundle text.

name: pages

on:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: build web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install deps
        run: npm ci

      - name: build web bundle
        run: npm run -w @shield-scanner/web build

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    name: deploy to github pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
