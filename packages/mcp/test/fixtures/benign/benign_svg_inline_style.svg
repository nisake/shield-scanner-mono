<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <symbol id="star" viewBox="0 0 10 10">
      <polygon points="5,0 6,4 10,4 7,6 8,10 5,8 2,10 3,6 0,4 4,4" fill="#f1c40f"/>
    </symbol>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dff9fb"/>
      <stop offset="1" stop-color="#7ed6df"/>
    </linearGradient>
  </defs>
  <style>
    .label { font-family: Verdana, sans-serif; font-size: 14px; fill: #2c3e50; }
  </style>
  <rect x="0" y="0" width="200" height="100" fill="url(#bg)"/>
  <use href="#star" x="20" y="40" width="20" height="20"/>
  <use xlink:href="#star" x="60" y="40" width="20" height="20"/>
  <text x="100" y="55" class="label">Featured</text>
  <a href="https://example.com/about">
    <text x="100" y="80" class="label">Learn more</text>
  </a>
</svg>
