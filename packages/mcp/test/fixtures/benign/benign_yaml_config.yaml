# Plain configuration file — no instruction phrases, no dangerous tags,
# no anchor bombs. Benign baseline for the structured-text detector.
server:
  host: 0.0.0.0
  port: 8080
  workers: 4

database:
  driver: postgres
  url: postgres://user:pass@localhost:5432/app
  pool_size: 10

logging:
  level: info
  format: json
